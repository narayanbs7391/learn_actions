name: jobs-lab3-types
on:
  workflow_dispatch:

jobs:
    job-1:
        runs-on: ubuntu-latest
        steps:
            - name: step1
              run: |
                echo "This is a step in a job that runs on ubuntu-latest"
            - name: step2
              run: |
                echo "This is another step in the same job that runs on ubuntu-latest"
    job-2:
        runs-on: ubuntu-latest
        steps:
            - name: step1
              run: |
                echo "This is a step in job-2 that also runs on ubuntu-latest"
            - name: step2
              run: |
                echo "This is another step in job-2 that also runs on ubuntu-latest"
    job-3:
        runs-on: ubuntu-latest
        needs: [job-1, job-2]
        steps:
            - name: step1
              run: |
                echo "This is a step in job-3 that runs after job-1 and job-2 have completed"
            - name: step2
              run: |
                echo "This is another step in job-3 that also runs after job-1 and job-2 have completed"

