name: 'hello-world'
description: 'greeting the world'
inputs:
    who-to-greet: #id for input
        description: 'who to greet'
        required: true
        default: 'World'
outputs:
    random-number: #id for output
        description: 'the random number'
        value: ${{ steps.generate-random-number.outputs.random-number }}

runs:
    using: 'composite'
    steps:
        - name: set greeting
          id: set-greeting
          run: echo "Hello, $WHO_TO_GREET"
          shell: bash
          env:
              WHO_TO_GREET: ${{ inputs.who-to-greet }}
        - name: generate random number
          id: generate-random-number
          run: echo "random-number=$RANDOM" >> $GITHUB_OUTPUT
          shell: bash

        - name: set github action path
          run: echo "GITHUB_PATH=$GITHUB_ACTION_PATH" >> $GITHUB_PATH
          shell: bash
          env:
            GITHUB_ACTION_PATH: ${{ github.action_path }}
        
        - name: run goodbye.sh script
          run: ./goodbye.sh
          shell: bash
            